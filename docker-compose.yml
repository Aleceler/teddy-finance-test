services:
  postgres:
    image: postgres:16-alpine
    container_name: teddy-open-finance-postgres
    restart: unless-stopped
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-teddy_open_finance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: back-end/Dockerfile
    container_name: teddy-open-finance-backend
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_NAME: ${DATABASE_NAME:-teddy_open_finance}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    volumes:
      - .:/workspace
      - /workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/healthz']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  frontend:
    build:
      context: .
      dockerfile: front-end/Dockerfile
    container_name: teddy-open-finance-frontend
    restart: unless-stopped
    ports:
      - '4200:4200'
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - .:/workspace
      - /workspace/node_modules
    depends_on:
      backend:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data:

name: Backend CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'back-end/**'
      - 'eslint.base.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'nx.json'
      - 'tsconfig.base.json'
      - 'tsconfig.json'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'back-end/**'
      - 'eslint.base.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'nx.json'
      - 'tsconfig.base.json'
      - 'tsconfig.json'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  NX_DAEMON: false

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          filter: tree:0

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx nx run @org/back-end:lint

      - name: Test
        run: npx nx run @org/back-end:test

      - name: Build
        run: npx nx run @org/back-end:build

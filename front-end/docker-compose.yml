services:
  frontend:
    build:
      context: ..
      dockerfile: front-end/Dockerfile
    container_name: teddy-open-finance-frontend
    restart: unless-stopped
    ports:
      - '4200:4200'
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - ..:/workspace
      - /workspace/node_modules
    stdin_open: true
    tty: true
